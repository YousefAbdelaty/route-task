<div class="issueListWrapper">
    <h1 class="page-title">Issues</h1>

    <input type="search" [(ngModel)]="searchTerm" placeholder="Search issues..." class="search"
        (ngModelChange)="searching()" (keyup.enter)="searching()" (keyup.escape)="clearSearch()">

    @if (isLoading) {
    <div class="state-box loading-box">
        <div class="spinner"></div>
        <p>Loading issues...</p>
    </div>
    }

    @if (errorMsg) {
    <div class="state-box error-box">
        <p>⚠️ {{ errorMsg }}</p>
    </div>
    }

    @if (!isLoading && !errorMsg) {
    <ul class="row gap-4">
        @for (post of posts; track post.id) {
        <li (click)="postNavigate(post.id)" class="col-3 post-card">
            <span class="post-id">#{{ post.id }}</span>
            <a>{{ post.title }}</a>
        </li>
        }
    </ul>
    }

    @if (!isLoading && !errorMsg && posts.length === 0) {
    <p class="no-results">No issues match your search.</p>
    }
</div>
