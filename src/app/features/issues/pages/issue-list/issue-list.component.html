<div class="issueListWrapper ">
    <input type="search" [(ngModel)]="searchTerm" placeholder="Search..." class="search" (ngModelChange)="searching()"
        (keyup.enter)="searching()" (keyup.escape)="clearSearch()">
    <ul class="row gap-5">
        <li (click)="postNavigate(post.id)" *ngFor="let post of posts |slice:0:50; let i = index " class="col-3 ">
            <a>{{post.title}}</a>
        </li>

    </ul>
</div>
